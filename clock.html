<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Clock Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            text-align: center;
        }

        .clock-wrapper {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 60px 80px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        .digital-clock {
            font-size: 120px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            font-family: 'Courier New', monospace;
            letter-spacing: 8px;
            line-height: 1.2;
            margin-bottom: 30px;
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% {
                text-shadow: 0 0 20px rgba(0, 0, 0, 0.5), 0 0 30px rgba(102, 126, 234, 0.5);
            }
            50% {
                text-shadow: 0 0 30px rgba(0, 0, 0, 0.7), 0 0 50px rgba(102, 126, 234, 0.8);
            }
        }

        .time-display {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            margin-top: 40px;
        }

        .time-unit {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .time-value {
            font-size: 60px;
            font-weight: bold;
            color: #4ade80;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 10px rgba(74, 222, 128, 0.5);
        }

        .time-label {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .analog-clock {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 4px solid rgba(255, 255, 255, 0.3);
            position: relative;
            margin: 40px auto;
            box-shadow: 0 0 30px rgba(102, 126, 234, 0.5), inset 0 0 30px rgba(0, 0, 0, 0.3);
        }

        .clock-center {
            width: 20px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }

        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom center;
            border-radius: 10px;
        }

        .hour-hand {
            width: 8px;
            height: 80px;
            background: linear-gradient(to top, #ff6b6b, rgba(255, 107, 107, 0.3));
            margin-left: -4px;
            box-shadow: 0 0 10px rgba(255, 107, 107, 0.5);
        }

        .minute-hand {
            width: 6px;
            height: 110px;
            background: linear-gradient(to top, #4ade80, rgba(74, 222, 128, 0.3));
            margin-left: -3px;
            box-shadow: 0 0 10px rgba(74, 222, 128, 0.5);
        }

        .second-hand {
            width: 3px;
            height: 120px;
            background: linear-gradient(to top, #fbbf24, rgba(251, 191, 36, 0.5));
            margin-left: -1.5px;
            box-shadow: 0 0 8px rgba(251, 191, 36, 0.8);
        }

        .clock-number {
            position: absolute;
            width: 100%;
            height: 100%;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.8);
        }

        .clock-number span {
            display: inline-block;
            width: 40px;
            height: 40px;
            line-height: 40px;
        }

        .date-display {
            font-size: 24px;
            color: rgba(255, 255, 255, 0.9);
            margin-top: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .day-display {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 10px;
            letter-spacing: 2px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        .info-box {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .info-label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-value {
            font-size: 28px;
            font-weight: bold;
            color: #4ade80;
            font-family: 'Courier New', monospace;
        }

        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4ade80;
            margin-right: 8px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
                box-shadow: 0 0 5px #4ade80;
            }
            50% {
                opacity: 0.5;
                box-shadow: 0 0 15px #4ade80;
            }
        }

        .title {
            font-size: 36px;
            color: #fff;
            margin-bottom: 30px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        @media (max-width: 768px) {
            .digital-clock {
                font-size: 60px;
                letter-spacing: 4px;
            }

            .clock-wrapper {
                padding: 40px 30px;
            }

            .title {
                font-size: 28px;
            }

            .time-display {
                grid-template-columns: 1fr;
            }

            .analog-clock {
                width: 200px;
                height: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">⏰ LIVE CLOCK DASHBOARD</div>
        <div class="clock-wrapper">
            <!-- Digital Clock -->
            <div class="digital-clock" id="digitalClock">00:00:00</div>

            <!-- Analog Clock -->
            <div class="analog-clock">
                <div class="clock-center"></div>
                <div class="hand hour-hand" id="hourHand"></div>
                <div class="hand minute-hand" id="minuteHand"></div>
                <div class="hand second-hand" id="secondHand"></div>
                <div class="clock-number">
                    <span style="position: absolute; top: 15px; left: 50%; transform: translateX(-50%);">12</span>
                    <span style="position: absolute; right: 20px; top: 50%; transform: translateY(-50%);">3</span>
                    <span style="position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);">6</span>
                    <span style="position: absolute; left: 20px; top: 50%; transform: translateY(-50%);">9</span>
                </div>
            </div>

            <!-- Time Breakdown -->
            <div class="time-display">
                <div class="time-unit">
                    <div class="time-value" id="hoursValue">00</div>
                    <div class="time-label">Hours</div>
                </div>
                <div class="time-unit">
                    <div class="time-value" id="minutesValue">00</div>
                    <div class="time-label">Minutes</div>
                </div>
                <div class="time-unit">
                    <div class="time-value" id="secondsValue">00</div>
                    <div class="time-label">Seconds</div>
                </div>
            </div>

            <!-- Date Display -->
            <div class="date-display" id="dateDisplay">Loading...</div>
            <div class="day-display" id="dayDisplay">Loading...</div>

            <!-- Info Grid -->
            <div class="info-grid">
                <div class="info-box">
                    <div class="info-label">
                        <span class="status-indicator"></span>
                        Status
                    </div>
                    <div class="info-value">ACTIVE</div>
                </div>
                <div class="info-box">
                    <div class="info-label">Timezone</div>
                    <div class="info-value" id="timezoneValue">UTC</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();

            // Get time components
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');

            // Update digital clock
            document.getElementById('digitalClock').textContent = `${hours}:${minutes}:${seconds}`;

            // Update time breakdown
            document.getElementById('hoursValue').textContent = hours;
            document.getElementById('minutesValue').textContent = minutes;
            document.getElementById('secondsValue').textContent = seconds;

            // Update analog clock hands
            const secondDegrees = (seconds / 60) * 360;
            const minuteDegrees = (minutes / 60) * 360 + (seconds / 60) * 6;
            const hourDegrees = (hours % 12 / 12) * 360 + (minutes / 60) * 30;

            document.getElementById('secondHand').style.transform = `rotate(${secondDegrees}deg)`;
            document.getElementById('minuteHand').style.transform = `rotate(${minuteDegrees}deg)`;
            document.getElementById('hourHand').style.transform = `rotate(${hourDegrees}deg)`;

            // Update date
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const dateString = now.toLocaleDateString('en-US', options);
            document.getElementById('dateDisplay').textContent = dateString;

            // Update day
            const dayNames = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            const dayName = dayNames[now.getDay()];
            document.getElementById('dayDisplay').textContent = dayName;

            // Update timezone
            const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
            document.getElementById('timezoneValue').textContent = timezone;
        }

        // Update clock every 100ms for smooth second hand movement
        updateClock();
        setInterval(updateClock, 100);
    </script>
</body>
</html>

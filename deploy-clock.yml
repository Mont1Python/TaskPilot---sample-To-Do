---
# Ansible Playbook to Deploy Clock Application
# This playbook deploys a real-time clock dashboard to your cluster

- name: Deploy Live Clock Dashboard
  hosts: localhost
  connection: local
  gather_facts: yes
  
  vars:
    clock_namespace: clock-dashboard
    clock_app_name: live-clock
    docker_image: clock-app:latest

  tasks:
    
    - name: Display Playbook Information
      debug:
        msg:
          - "========================================"
          - "Live Clock Dashboard Deployment"
          - "========================================"
          - "Namespace: {{ clock_namespace }}"
          - "Application: {{ clock_app_name }}"
          - "Date: {{ ansible_date_time.iso8601 }}"
          - "========================================"

    - name: Create clock namespace
      kubernetes.core.k8s:
        name: "{{ clock_namespace }}"
        api_version: v1
        kind: Namespace
        state: present

    - name: Create clock config map
      kubernetes.core.k8s:
        namespace: "{{ clock_namespace }}"
        definition:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: clock-config
            namespace: "{{ clock_namespace }}"
          data:
            refresh_interval: "100"  # milliseconds
            update_frequency: "every second"

    - name: Deploy clock application
      kubernetes.core.k8s:
        namespace: "{{ clock_namespace }}"
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: "{{ clock_app_name }}"
            namespace: "{{ clock_namespace }}"
            labels:
              app: "{{ clock_app_name }}"
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: "{{ clock_app_name }}"
            template:
              metadata:
                labels:
                  app: "{{ clock_app_name }}"
              spec:
                containers:
                - name: clock
                  image: nginx:alpine
                  ports:
                  - containerPort: 80
                  volumeMounts:
                  - name: clock-html
                    mountPath: /usr/share/nginx/html
                  resources:
                    requests:
                      memory: "64Mi"
                      cpu: "50m"
                    limits:
                      memory: "128Mi"
                      cpu: "200m"
                  livenessProbe:
                    httpGet:
                      path: /
                      port: 80
                    initialDelaySeconds: 10
                    periodSeconds: 30
                  readinessProbe:
                    httpGet:
                      path: /
                      port: 80
                    initialDelaySeconds: 5
                    periodSeconds: 10
                volumes:
                - name: clock-html
                  configMap:
                    name: clock-html

    - name: Create clock HTML config map
      kubernetes.core.k8s:
        namespace: "{{ clock_namespace }}"
        definition:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: clock-html
            namespace: "{{ clock_namespace }}"
          data:
            index.html: |
              <!DOCTYPE html>
              <html lang="en">
              <head>
                  <meta charset="UTF-8">
                  <meta name="viewport" content="width=device-width, initial-scale=1.0">
                  <title>Real-Time Clock Dashboard</title>
                  <style>
                      * {
                          margin: 0;
                          padding: 0;
                          box-sizing: border-box;
                      }

                      body {
                          background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                          min-height: 100vh;
                          display: flex;
                          justify-content: center;
                          align-items: center;
                          font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                      }

                      .container {
                          text-align: center;
                      }

                      .clock-wrapper {
                          background: rgba(255, 255, 255, 0.1);
                          backdrop-filter: blur(10px);
                          border-radius: 30px;
                          padding: 60px 80px;
                          box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
                          border: 1px solid rgba(255, 255, 255, 0.18);
                      }

                      .digital-clock {
                          font-size: 120px;
                          font-weight: bold;
                          color: #fff;
                          text-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
                          font-family: 'Courier New', monospace;
                          letter-spacing: 8px;
                          line-height: 1.2;
                          margin-bottom: 30px;
                          animation: glow 2s ease-in-out infinite;
                      }

                      @keyframes glow {
                          0%, 100% {
                              text-shadow: 0 0 20px rgba(0, 0, 0, 0.5), 0 0 30px rgba(102, 126, 234, 0.5);
                          }
                          50% {
                              text-shadow: 0 0 30px rgba(0, 0, 0, 0.7), 0 0 50px rgba(102, 126, 234, 0.8);
                          }
                      }

                      .time-display {
                          display: grid;
                          grid-template-columns: 1fr 1fr 1fr;
                          gap: 20px;
                          margin-top: 40px;
                      }

                      .time-unit {
                          background: rgba(255, 255, 255, 0.1);
                          border-radius: 15px;
                          padding: 20px;
                          border: 1px solid rgba(255, 255, 255, 0.2);
                      }

                      .time-value {
                          font-size: 60px;
                          font-weight: bold;
                          color: #4ade80;
                          font-family: 'Courier New', monospace;
                          text-shadow: 0 0 10px rgba(74, 222, 128, 0.5);
                      }

                      .time-label {
                          font-size: 16px;
                          color: rgba(255, 255, 255, 0.8);
                          margin-top: 10px;
                          text-transform: uppercase;
                          letter-spacing: 2px;
                      }

                      .analog-clock {
                          width: 300px;
                          height: 300px;
                          border-radius: 50%;
                          background: rgba(255, 255, 255, 0.05);
                          border: 4px solid rgba(255, 255, 255, 0.3);
                          position: relative;
                          margin: 40px auto;
                          box-shadow: 0 0 30px rgba(102, 126, 234, 0.5), inset 0 0 30px rgba(0, 0, 0, 0.3);
                      }

                      .clock-center {
                          width: 20px;
                          height: 20px;
                          background: #fff;
                          border-radius: 50%;
                          position: absolute;
                          top: 50%;
                          left: 50%;
                          transform: translate(-50%, -50%);
                          z-index: 10;
                          box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
                      }

                      .hand {
                          position: absolute;
                          bottom: 50%;
                          left: 50%;
                          transform-origin: bottom center;
                          border-radius: 10px;
                      }

                      .hour-hand {
                          width: 8px;
                          height: 80px;
                          background: linear-gradient(to top, #ff6b6b, rgba(255, 107, 107, 0.3));
                          margin-left: -4px;
                          box-shadow: 0 0 10px rgba(255, 107, 107, 0.5);
                      }

                      .minute-hand {
                          width: 6px;
                          height: 110px;
                          background: linear-gradient(to top, #4ade80, rgba(74, 222, 128, 0.3));
                          margin-left: -3px;
                          box-shadow: 0 0 10px rgba(74, 222, 128, 0.5);
                      }

                      .second-hand {
                          width: 3px;
                          height: 120px;
                          background: linear-gradient(to top, #fbbf24, rgba(251, 191, 36, 0.5));
                          margin-left: -1.5px;
                          box-shadow: 0 0 8px rgba(251, 191, 36, 0.8);
                      }

                      .title {
                          font-size: 36px;
                          color: #fff;
                          margin-bottom: 30px;
                          text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
                          letter-spacing: 2px;
                      }

                      .date-display {
                          font-size: 24px;
                          color: rgba(255, 255, 255, 0.9);
                          margin-top: 30px;
                          text-transform: uppercase;
                          letter-spacing: 1px;
                      }

                      .status {
                          font-size: 18px;
                          color: #4ade80;
                          margin-top: 20px;
                          letter-spacing: 2px;
                      }
                  </style>
              </head>
              <body>
                  <div class="container">
                      <div class="title">⏰ LIVE CLOCK DASHBOARD</div>
                      <div class="clock-wrapper">
                          <div class="digital-clock" id="digitalClock">00:00:00</div>

                          <div class="analog-clock">
                              <div class="clock-center"></div>
                              <div class="hand hour-hand" id="hourHand"></div>
                              <div class="hand minute-hand" id="minuteHand"></div>
                              <div class="hand second-hand" id="secondHand"></div>
                          </div>

                          <div class="time-display">
                              <div class="time-unit">
                                  <div class="time-value" id="hoursValue">00</div>
                                  <div class="time-label">Hours</div>
                              </div>
                              <div class="time-unit">
                                  <div class="time-value" id="minutesValue">00</div>
                                  <div class="time-label">Minutes</div>
                              </div>
                              <div class="time-unit">
                                  <div class="time-value" id="secondsValue">00</div>
                                  <div class="time-label">Seconds</div>
                              </div>
                          </div>

                          <div class="date-display" id="dateDisplay">Loading...</div>
                          <div class="status">Updates every 100ms</div>
                      </div>
                  </div>

                  <script>
                      function updateClock() {
                          const now = new Date();
                          const hours = String(now.getHours()).padStart(2, '0');
                          const minutes = String(now.getMinutes()).padStart(2, '0');
                          const seconds = String(now.getSeconds()).padStart(2, '0');

                          document.getElementById('digitalClock').textContent = `${hours}:${minutes}:${seconds}`;
                          document.getElementById('hoursValue').textContent = hours;
                          document.getElementById('minutesValue').textContent = minutes;
                          document.getElementById('secondsValue').textContent = seconds;

                          const secondDegrees = (seconds / 60) * 360;
                          const minuteDegrees = (minutes / 60) * 360 + (seconds / 60) * 6;
                          const hourDegrees = (hours % 12 / 12) * 360 + (minutes / 60) * 30;

                          document.getElementById('secondHand').style.transform = `rotate(${secondDegrees}deg)`;
                          document.getElementById('minuteHand').style.transform = `rotate(${minuteDegrees}deg)`;
                          document.getElementById('hourHand').style.transform = `rotate(${hourDegrees}deg)`;

                          const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
                          const dateString = now.toLocaleDateString('en-US', options);
                          document.getElementById('dateDisplay').textContent = dateString;
                      }

                      updateClock();
                      setInterval(updateClock, 100);
                  </script>
              </body>
              </html>

    - name: Create clock service
      kubernetes.core.k8s:
        namespace: "{{ clock_namespace }}"
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: "{{ clock_app_name }}-service"
            namespace: "{{ clock_namespace }}"
          spec:
            type: LoadBalancer
            selector:
              app: "{{ clock_app_name }}"
            ports:
            - protocol: TCP
              port: 80
              targetPort: 80

    - name: Wait for service to be ready
      kubernetes.core.k8s_info:
        kind: Service
        namespace: "{{ clock_namespace }}"
        name: "{{ clock_app_name }}-service"
      register: service_info
      until: service_info.resources[0].status.loadBalancer.ingress is defined
      retries: 30
      delay: 2

    - name: Get service external IP
      set_fact:
        clock_external_ip: "{{ service_info.resources[0].status.loadBalancer.ingress[0].ip }}"
      ignore_errors: yes

    - name: Display deployment information
      debug:
        msg:
          - "========================================"
          - "✓ Clock Dashboard Deployed Successfully!"
          - "========================================"
          - "Namespace: {{ clock_namespace }}"
          - "Application: {{ clock_app_name }}"
          - "Service: {{ clock_app_name }}-service"
          - "Status: Active"
          - ""
          - "Access Information:"
          - "  Kubernetes Service: {{ clock_app_name }}-service.{{ clock_namespace }}.svc.cluster.local"
          - "  External IP: {{ clock_external_ip | default('Pending - check with kubectl') }}"
          - "  URL: http://{{ clock_external_ip | default('LoadBalancer-IP') }}"
          - ""
          - "View Status:"
          - "  kubectl get pods -n {{ clock_namespace }}"
          - "  kubectl get svc -n {{ clock_namespace }}"
          - ""
          - "Features:"
          - "  ✓ Real-time digital clock (HH:MM:SS)"
          - "  ✓ Analog clock with smooth hands"
          - "  ✓ Updates every 100ms"
          - "  ✓ Hour, minute, second breakdown"
          - "  ✓ Current date display"
          - "  ✓ Responsive design"
          - ""
          - "Clock Updates: Every Second"
          - "========================================"

    - name: Get pod information
      kubernetes.core.k8s_info:
        kind: Pod
        namespace: "{{ clock_namespace }}"
        label_selectors:
          - app={{ clock_app_name }}
      register: pods_info

    - name: Display pod details
      debug:
        msg:
          - "Pod Information:"
          - "  Total Pods: {{ pods_info.resources | length }}"
          - "  Pod Name: {{ pods_info.resources[0].metadata.name }}"
          - "  Status: {{ pods_info.resources[0].status.phase }}"
          - "  Ready: {{ pods_info.resources[0].status.conditions[1].status }}"
      when: pods_info.resources | length > 0
